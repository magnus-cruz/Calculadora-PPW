<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0f172a">
    <title>Calculadora PPW</title>
    <link rel="stylesheet" href="CSS/style.css">
</head>
<body>
    <main class="app-shell">
        <section class="hero" aria-labelledby="app-title">
            <p class="eyebrow">Projeto PPW</p>
            <h1 id="app-title">Calculadora online</h1>
            <p class="hero-copy">
                Interface responsiva, simples e pronta para publicar no GitHub Pages.
            </p>
        </section>

        <section class="calculator-card" aria-label="Calculadora simples">
            <div class="calculator-topbar">
                <span class="status-dot" aria-hidden="true"></span>
                <span>Calculadora ativa</span>
            </div>

            <input type="text" class="display" id="display" value="0" aria-label="Display da calculadora" readonly>

            <div class="calculadora" aria-label="Teclado da calculadora">
                <button class="btn-calculadora action" type="button">C</button>
                <button class="btn-calculadora operator" type="button">/</button>
                <button class="btn-calculadora operator" type="button">*</button>
                <button class="btn-calculadora operator" type="button">-</button>
                <button class="btn-calculadora number" type="button">7</button>
                <button class="btn-calculadora number" type="button">8</button>
                <button class="btn-calculadora number" type="button">9</button>
                <button class="btn-calculadora operator" type="button">+</button>
                <button class="btn-calculadora number" type="button">4</button>
                <button class="btn-calculadora number" type="button">5</button>
                <button class="btn-calculadora number" type="button">6</button>
                <button class="btn-calculadora igual" type="button">=</button>
                <button class="btn-calculadora number" type="button">1</button>
                <button class="btn-calculadora number" type="button">2</button>
                <button class="btn-calculadora number" type="button">3</button>
                <button class="btn-calculadora number" type="button">0</button>
                <button class="btn-calculadora number" type="button">.</button>
                <button class="btn-calculadora action" type="button">Delete</button>
            </div>
        </section>
    </main>
    <script src="js/script.js"></script>
</body>
</html>
