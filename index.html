<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="calculadora">
        <input type="text" class="display">
        <button class="btn-calculadora number">1</button>
        <button class="btn-calculadora number">2</button>
        <button class="btn-calculadora number">3</button>
        <button class="btn-calculadora number">4</button>
        <button class="btn-calculadora number">5</button>
        <button class="btn-calculadora number">6</button>
        <button class="btn-calculadora number">7</button>
        <button class="btn-calculadora number">8</button>
        <button class="btn-calculadora number">9</button>
        <button class="btn-calculadora number">.</button>
        <button class="btn-calculadora operator">+</button>
        <button class="btn-calculadora operator">*</button>
        <button class="btn-calculadora operator">/</button>
        <button class="btn-calculadora operator">-</button>
        <button class="btn-calculadora action">C</button>
        <button class="btn-calculadora action">Delete</button>
        <button class="btn-calculadora zero">0</button>
        <button class="btn-calculadora igual">=</button>
    </div>
    


    <script src="js/script.js"></script>
</body>
</html>
